name: CI

# The dev-process gate (lint -> verify -> e2e) run on every PR and every push to main.
# verify/lint do NOT need the heavy stack: essentia, gradio, pytorch, and the frozen model
# are all imported lazily (or not at all) by the test path, so a lean pip install runs the
# full suite. The audio-to-pitch path (essentia/compiam) is exercised locally, not in CI.
# e2e drives the real site in headless Chromium with the recognizer API stubbed.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# One run per branch; a new push cancels the previous in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: verify (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lean test deps
        # Only what the test path imports. librosa/soundfile cover the lazy tonic
        # estimate in raaga_id.features; xgboost covers RaagaXGB. No pytorch/essentia.
        run: pip install numpy scipy pandas scikit-learn xgboost librosa soundfile pytest
      - name: Run the full test suite
        run: pytest tests/ -q

  lint:
    name: lint (style + structure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint deps
        run: pip install pyyaml
      - name: No em-dashes in prose (Markdown)
        # Project style: never an em-dash (U+2014) in human-facing prose. Scoped to
        # tracked Markdown; site HTML is checked by hand (its em-dashes are in code comments).
        run: |
          if git ls-files '*.md' | xargs -r grep -nP '\x{2014}'; then
            echo "::error::Em-dash (U+2014) found in Markdown. Project style: use commas/parens/colons instead."
            exit 1
          fi
          echo "no em-dashes"
      - name: CITATION.cff parses
        run: python -c "import yaml; yaml.safe_load(open('CITATION.cff')); print('CITATION.cff ok')"
      - name: Site JSON-LD is valid JSON
        run: |
          python - <<'PY'
          import glob, json, re, sys
          bad = 0
          for f in glob.glob("site/**/*.html", recursive=True):
              html = open(f, encoding="utf-8").read()
              for block in re.findall(r'<script type="application/ld\+json">(.*?)</script>', html, re.S):
                  try:
                      json.loads(block)
                  except Exception as e:
                      print(f"::error file={f}::invalid JSON-LD: {e}")
                      bad += 1
          if bad:
              sys.exit(1)
          print("JSON-LD ok")
          PY
      - name: Worker JavaScript parses
        run: node --check cloudflare/worker/src/index.js && echo "worker ok"

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # serves the static site via python -m http.server
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - name: Install Playwright + Chromium
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run the browser user tests
        working-directory: e2e
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
