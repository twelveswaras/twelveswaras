<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="twelveswaras">
  <!-- Shared urbanmorph treatment: ~22%-radius rounded-square tile, brand fill, white mark.
       twelveswaras' mark = a 12-bar pitch-class histogram (the twelve swaras). -->
  <defs>
