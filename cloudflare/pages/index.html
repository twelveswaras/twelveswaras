<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>twelveswaras — identify a raaga</title>
<meta name="theme-color" content="#0b0a08">
<style>
  :root{
    --ink:#0b0a08; --raise:#16130f; --raise2:#1c1811; --line:#2a241c; --line2:#39301f;
    --paper:#f2ece2; --muted:#a89e8e; --faint:#6f6656;
    --amber:#f59e0b; --amber-lo:#d97706; --amber-hi:#fbbf24; --jade:#74c69d;
    --sans:"SF Pro Display",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:radial-gradient(120% 90% at 50% -10%, #17130d 0%, var(--ink) 60%);
    color:var(--paper);font-family:var(--sans);-webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px}
  :focus-visible{outline:2px solid var(--amber);outline-offset:3px;border-radius:12px}
  .stage{width:100%;max-width:392px;display:flex;flex-direction:column;gap:2px}
  .brand{display:flex;align-items:center;gap:.5rem;font-weight:800;letter-spacing:-.3px;font-size:.98rem}
  .brand .a{color:var(--paper)} .brand .b{color:var(--amber)}
  .brand svg{width:22px;height:22px;flex:0 0 auto}
  .eyebrow{font-family:var(--mono);font-size:.7rem;letter-spacing:.26em;text-indent:.26em;
    text-transform:uppercase;color:var(--muted);text-align:center;margin:18px 0 0;transition:color .3s}
  .eyebrow.warm{color:var(--amber-hi)} .eyebrow.done{color:var(--jade)}
  .orb-btn{appearance:none;border:0;background:transparent;padding:0;margin:8px auto 0;display:block;
    cursor:pointer;border-radius:50%;line-height:0}
  canvas{display:block;width:248px;height:248px;touch-action:manipulation}
  .meta{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:6px;min-height:26px}
  .timer{font-family:var(--mono);font-size:1.02rem;font-variant-numeric:tabular-nums;color:var(--paper)}
  .timer.dim{color:var(--faint)}
  .sa{font-family:var(--mono);font-size:.72rem;color:var(--amber-hi);background:#f59e0b1a;
    border:1px solid #f59e0b33;border-radius:999px;padding:.2rem .55rem;opacity:0;transition:opacity .35s}
  .sa.show{opacity:1}
  .say{text-align:center;min-height:2.6rem;margin:6px 2px 0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px}
  .say .lead{font-size:.98rem;color:var(--muted);text-wrap:balance}
  .say .raga{font-size:2.15rem;font-weight:800;letter-spacing:-.02em;line-height:1.04;color:var(--paper);
    opacity:0;transform:translateY(6px);transition:opacity .45s,transform .45s}
  .say .raga.show{opacity:1;transform:none}
  .say .raga.done{color:#fff}
  .guides{display:flex;flex-direction:column;gap:9px;margin:14px 2px 0}
  .guide{display:flex;gap:.5rem;align-items:flex-start;margin:0;font-size:.82rem;line-height:1.5;color:var(--muted)}
  .guide b{color:var(--paper);font-weight:600}
  .guide.privacy{color:var(--faint);font-size:.78rem} .guide.privacy b{color:var(--muted)}
  .guides.hide{display:none} .guides.recording .drone{display:none}
  .top3{list-style:none;margin:14px 0 0;padding:0;display:flex;flex-direction:column;gap:9px;opacity:0;transition:opacity .4s}
  .top3.show{opacity:1}
  .row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:6px 10px}
  .row .name{font-size:.98rem;color:var(--muted)} .row.lead .name{color:var(--paper);font-weight:650}
  .row .pct{font-family:var(--mono);font-size:.78rem;color:var(--faint);font-variant-numeric:tabular-nums}
  .row.lead .pct{color:var(--amber-hi)}
  .track{grid-column:1 / -1;height:4px;border-radius:3px;background:#ffffff10;overflow:hidden}
  .fill{height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,var(--amber-lo),var(--amber-hi));transition:width .35s}
  .row.lead .fill{background:linear-gradient(90deg,var(--amber),var(--amber-hi))}
  .done .row.lead .fill{background:linear-gradient(90deg,#5aa87f,var(--jade))} .done .row.lead .pct{color:var(--jade)}
  .controls{margin-top:18px;display:flex;justify-content:center;min-height:48px;align-items:center}
  .entry{display:flex;flex-direction:column;align-items:center;gap:9px}
  .btn{appearance:none;font-family:var(--sans);font-weight:700;font-size:1rem;cursor:pointer;border-radius:12px;
    padding:.8rem 1.6rem;border:1px solid transparent;transition:transform .12s,background .15s,border-color .15s}
  .btn:active{transform:translateY(1px)}
  .btn.stop{background:transparent;color:var(--paper);border-color:var(--line2)}
  .btn.stop:hover{border-color:var(--amber);color:var(--amber-hi)}
  .btn.again{background:#ffffff0d;color:var(--paper);border-color:var(--line2)} .btn.again:hover{border-color:var(--jade);color:#fff}
  .btn.cancel{background:transparent;color:var(--muted);border-color:var(--line2)}
  .ghost-btn{appearance:none;background:transparent;border:0;cursor:pointer;font-family:var(--mono);
    font-size:.76rem;color:var(--amber-hi);padding:.3rem .5rem;border-radius:8px} .ghost-btn:hover{color:#fff;text-decoration:underline}
  .learn{font-family:var(--mono);font-size:.78rem;color:var(--jade);text-decoration:none;padding:.3rem} .learn:hover{text-decoration:underline}
  .hint{font-family:var(--mono);font-size:.74rem;color:var(--faint);text-align:center}
  .err{color:#e6a15a;font-size:.85rem;text-align:center;max-width:32ch;margin:0 auto}
  @media (prefers-reduced-motion:reduce){ .raga,.sa{transition:opacity .2s} }
</style>
</head>
<body>
<div class="stage" role="application" aria-label="twelveswaras raaga recognizer">
  <div class="brand">
    <svg viewBox="0 0 256 256" aria-hidden="true"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#b45309"/></linearGradient></defs>
      <rect width="256" height="256" rx="60" fill="url(#g)"/><g fill="#fff">
      <rect x="40" y="140" width="12" height="60" rx="6"/><rect x="60" y="104" width="12" height="96" rx="6"/>
      <rect x="80" y="150" width="12" height="50" rx="6"/><rect x="100" y="76" width="12" height="124" rx="6"/>
      <rect x="120" y="118" width="12" height="82" rx="6"/><rect x="140" y="92" width="12" height="108" rx="6"/>
      <rect x="160" y="60" width="12" height="140" rx="6"/><rect x="180" y="128" width="12" height="72" rx="6"/>
      <rect x="200" y="100" width="12" height="100" rx="6"/></g></svg>
    <span><span class="a">twelve</span><span class="b">swaras</span></span>
  </div>
  <p class="eyebrow" id="eyebrow">Identify a raaga</p>
  <button class="orb-btn" id="orb" aria-label="Tap to identify the raaga"><canvas id="cv" width="248" height="248"></canvas></button>
  <div class="meta"><span class="timer dim" id="timer">0.0s</span><span class="sa" id="sa"></span></div>
  <div class="say"><span class="lead" id="lead"></span><span class="raga" id="raga"></span></div>
  <div class="guides" id="guides">
    <p class="guide drone"><span aria-hidden="true">🎚️</span><span>Works best with a <b>tanpura or shruti-box drone</b> under the melody — a live concert always has one. The tonic (Sa) is found from it.</span></p>
    <p class="guide privacy"><span aria-hidden="true">🔒</span><span>Your recording is <b>never stored</b>. It's analysed to find the raaga, then discarded.</span></p>
  </div>
  <ul class="top3" id="top3" aria-live="polite"></ul>
  <div class="controls" id="controls"></div>
  <input type="file" id="file" accept="audio/*" hidden>
</div>

<script>
(function(){
  const API = new URLSearchParams(location.search).get('api') || '/api';
  const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const eyebrow=id('eyebrow'), timerEl=id('timer'), saEl=id('sa'), leadEl=id('lead'),
        ragaEl=id('raga'), top3El=id('top3'), controls=id('controls'), orb=id('orb'), guides=id('guides');
  function id(x){return document.getElementById(x);}

  const HOLD=3.0, MIN_LISTEN=8, MAX_S=45, SEND_EVERY=3500, FIRST_SEND=4500;
  const VERBS=['Tracing the swaras…','Listening for the phrases…','Following the gamaka…','Weighing the raagas…'];
  const TIPS=['🔊 A little louder, or move closer','🎯 Aim at the main voice or instrument','🤫 A quieter spot helps'];

  let mode='idle', source='live', t0=0, elapsed=0, conf=0, top3=[], swaraAct=new Array(12).fill(0);
  let leader='', leaderSince=0, phase='', nextTip=6, tipUntil=0, tipIdx=-1;
  let stream=null, rec=null, chunks=[], sendTimer=null, uiTimer=null, sending=false, lockName='', lockConf=0;

  // ---------- capture + API ----------
  function pickMime(){
    const c=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg'];
    return c.find(t=>window.MediaRecorder && MediaRecorder.isTypeSupported(t)) || '';
  }
  async function startLive(){
    resetState('live');
    setControls('<button class="btn stop" id="stop">Stop now</button>');
    id('stop').onclick=()=>finish(true);
    eyebrow.textContent='Identifying'; eyebrow.className='eyebrow warm';
    guides.className='guides recording'; leadEl.textContent='Finding the swaras…'; top3El.className='top3 show';
    try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(e){ return fail('Microphone access is needed to identify a live raaga. You can also upload a recording.'); }
    const mime=pickMime();
    rec=new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
    chunks=[]; rec.ondataavailable=e=>{ if(e.data && e.data.size) chunks.push(e.data); };
    rec.start(1000);
    t0=performance.now();
    uiTimer=setInterval(tick,33);
    sendTimer=setInterval(()=>maybeSend(mime), SEND_EVERY);
  }
  async function maybeSend(mime){
    if(mode!=='listening' || sending || elapsed<FIRST_SEND/1000 || !chunks.length) return;
    sending=true;
    const blob=new Blob(chunks, {type: mime||'audio/webm'});
    try{
      const fd=new FormData(); fd.append('audio', blob, 'clip.webm');
      const r=await fetch(API+'/identify', {method:'POST', body:fd});
      const d=await r.json();
      if(mode==='listening') applyResult(d);
    }catch(e){ /* transient; keep listening */ }
    finally{ sending=false; }
  }
  function applyResult(d){
    if(d && Array.isArray(d.swara_activation)) swaraAct=d.swara_activation;
    if(d && d.tonic_hz){ saEl.textContent='Sa · '+Math.round(d.tonic_hz)+' Hz'; saEl.className='sa show'; }
    if(d && d.top3 && d.top3.length){
      top3=d.top3; conf=d.top3[0].confidence||0;
      const ld=d.top3[0].raaga;
      if(ld!==leader){ leader=ld; leaderSince=elapsed; }
      renderRows(top3, false);
    }
  }

  // ---------- upload ----------
  async function startFile(file){
    resetState('file');
    eyebrow.textContent='Analysing recording'; eyebrow.className='eyebrow warm';
    guides.className='guides recording'; leadEl.textContent='Reading '+file.name.slice(0,30)+'…'; top3El.className='top3 show';
    setControls('<button class="btn cancel" id="cancel">Cancel</button>'); id('cancel').onclick=toIdle;
    t0=performance.now(); uiTimer=setInterval(tick,33);
    try{
      const fd=new FormData(); fd.append('audio', file, file.name);
      const r=await fetch(API+'/identify', {method:'POST', body:fd});
      const d=await r.json();
      applyResult(d);
      finish(true);
    }catch(e){ fail('That file could not be analysed. Try a clear clip with a drone.'); }
  }

  // ---------- the running clock + status + lock ----------
  function tick(){
    elapsed=(performance.now()-t0)/1000;
    timerEl.textContent=elapsed.toFixed(1)+'s'; timerEl.className='timer';
    if(mode!=='listening') return;
    const held=elapsed-leaderSince;
    let s;
    if(source==='file'){ s = conf<0.6?'Analysing…' : conf<0.9?'Almost there…' : 'Got it'; }
    else{
      if(elapsed>=nextTip && elapsed<MAX_S-3){ tipUntil=elapsed+2.6; nextTip+=7; tipIdx=(tipIdx+1)%TIPS.length; }
      if(elapsed<tipUntil) s=TIPS[tipIdx];
      else if(conf>0 && (held>=HOLD*0.7 || conf>=0.85)) s='Locking it in…';
      else s=conf>0?VERBS[Math.floor(elapsed/2.6)%VERBS.length]:'Finding the swaras…';
    }
    if(s!==phase){ phase=s; leadEl.textContent=s; }
    // lock on a STABLE answer after a real listen (not on an early confidence spike)
    const ready = conf>0 && leader && (elapsed-leaderSince)>=HOLD && elapsed>=MIN_LISTEN && conf>=0.55;
    if(ready || elapsed>=MAX_S) finish(true);
  }

  function finish(auto){
    if(mode!=='listening') return;
    mode='locked';
    stopCapture();
    clearInterval(uiTimer); clearInterval(sendTimer);
    if(!top3.length){ return noResult(); }
    lockName=top3[0].raaga; lockConf=conf;
    const sure=lockConf>=0.6;
    eyebrow.textContent=sure?'Confident':'Best guess'; eyebrow.className='eyebrow '+(sure?'done':'warm');
    leadEl.textContent=sure?('Heard for '+elapsed.toFixed(0)+'s'):('Heard '+elapsed.toFixed(0)+'s — a longer, closer listen helps');
    ragaEl.textContent=lockName; ragaEl.className='raga show'+(sure?' done':'');
    top3El.classList.toggle('done', sure); renderRows(top3, true);
    guides.className='guides hide';
    setControls('<div class="entry"><button class="btn again" id="again">Listen again</button>'
      +'<a class="learn" id="learn" href="/raaga/'+slug(lockName)+'.html">↗ How to hear '+lockName+'</a>'
      +'<button class="ghost-btn" id="up2">or upload a recording ↑</button></div>');
    id('again').onclick=startLive; id('up2').onclick=()=>id('file').click();
  }
  function noResult(){
    eyebrow.textContent='No raaga yet'; eyebrow.className='eyebrow';
    leadEl.textContent='No clear melody or drone was heard. Move closer, or upload a clip with a tanpura.';
    guides.className='guides';
    setControls('<div class="entry"><button class="btn again" id="again">Try again</button>'
      +'<button class="ghost-btn" id="up2">or upload a recording ↑</button></div>');
    id('again').onclick=startLive; id('up2').onclick=()=>id('file').click();
  }
  function fail(msg){
    stopCapture(); clearInterval(uiTimer); clearInterval(sendTimer); mode='idle';
    eyebrow.textContent='Identify a raaga'; eyebrow.className='eyebrow';
    leadEl.innerHTML='<span class="err">'+msg+'</span>'; guides.className='guides';
    setControls('<div class="entry"><button class="btn again" id="again">Try again</button>'
      +'<button class="ghost-btn" id="up2">upload a recording ↑</button></div>');
    id('again').onclick=startLive; id('up2').onclick=()=>id('file').click();
  }
  function stopCapture(){
    try{ if(rec && rec.state!=='inactive') rec.stop(); }catch(e){}
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  }

  function toIdle(){
    stopCapture(); clearInterval(uiTimer); clearInterval(sendTimer);
    mode='idle'; source='live'; elapsed=0; conf=0; top3=[]; swaraAct=new Array(12).fill(0); leader=''; phase='';
    eyebrow.textContent='Identify a raaga'; eyebrow.className='eyebrow';
    timerEl.textContent='0.0s'; timerEl.className='timer dim'; saEl.className='sa'; saEl.textContent='';
    ragaEl.className='raga'; ragaEl.textContent=''; leadEl.textContent="Tap once and hold your phone to the music. It names the raaga the moment it's sure.";
    top3El.className='top3'; top3El.innerHTML=''; guides.className='guides';
    setControls('<div class="entry"><span class="hint">Point your phone at the music, then tap</span>'
      +'<button class="ghost-btn" id="up">or upload a recording ↑</button></div>');
    id('up').onclick=()=>id('file').click();
    orb.setAttribute('aria-label','Tap to identify the raaga');
  }
  function resetState(src){
    source=src; mode='listening'; elapsed=0; conf=0; top3=[]; swaraAct=new Array(12).fill(0);
    leader=''; leaderSince=0; phase=''; nextTip=6; tipUntil=0; tipIdx=-1;
    saEl.className='sa'; ragaEl.className='raga'; ragaEl.textContent='';
  }
  function setControls(html){ controls.innerHTML=html; }

  // ---------- rows ----------
  let rowEls={};
  function renderRows(list, done){
    const key=list.slice(0,3).map(r=>r.raaga).join('|');
    if(key!==renderRows._k){ renderRows._k=key; top3El.innerHTML=''; rowEls={};
      list.slice(0,3).forEach((r,i)=>{ const li=document.createElement('li'); li.className='row'+(i===0?' lead':'');
        li.innerHTML='<span class="name">'+r.raaga+'</span><span class="pct">0%</span><span class="track"><span class="fill"></span></span>';
        top3El.appendChild(li); rowEls[r.raaga]=li; }); }
    list.slice(0,3).forEach((r,i)=>{ const li=rowEls[r.raaga]; if(!li)return; li.classList.toggle('lead',i===0);
      li.querySelector('.pct').textContent=Math.round((r.confidence||0)*100)+'%';
      li.querySelector('.fill').style.width=Math.min(100,(r.confidence||0)*100)+'%'; });
  }

  // ---------- canvas: the swara wheel, lit by the real pitch-class distribution ----------
  const size=248, dpr=Math.min(2,devicePixelRatio||1);
  cv.width=size*dpr; cv.height=size*dpr; ctx.scale(dpr,dpr);
  const cx=size/2, cy=size/2, ring=98, innerR=52, bars=12;
  function draw(now){
    const t=now/1000, active=mode!=='idle', locked=mode==='locked';
    ctx.clearRect(0,0,size,size);
    const pulse=reduce?0.5:(0.5+0.5*Math.sin(t*(active?3.2:1.4)));
    const gc=locked?'116,198,157':'245,158,11';
    const glow=ctx.createRadialGradient(cx,cy,4,cx,cy,ring);
    glow.addColorStop(0,'rgba('+gc+','+(0.14+0.14*pulse)+')'); glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(cx,cy,ring,0,7); ctx.fill();
    ctx.lineWidth=5; ctx.lineCap='round'; ctx.strokeStyle='rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.arc(cx,cy,ring,0,Math.PI*2); ctx.stroke();
    const shown=active?(locked?lockConf:conf):0;
    if(shown>0.001){ const a0=-Math.PI/2, a1=a0+shown*Math.PI*2;
      const gr=ctx.createLinearGradient(cx-ring,cy,cx+ring,cy);
      if(locked){gr.addColorStop(0,'#5aa87f');gr.addColorStop(1,'#74c69d');}else{gr.addColorStop(0,'#d97706');gr.addColorStop(1,'#fbbf24');}
      ctx.strokeStyle=gr; ctx.lineWidth=6; ctx.shadowBlur=16; ctx.shadowColor=locked?'rgba(116,198,157,.5)':'rgba(245,158,11,.5)';
      ctx.beginPath(); ctx.arc(cx,cy,ring,a0,a1); ctx.stroke(); ctx.shadowBlur=0; }
    const mx=Math.max(0.001,...swaraAct);
    for(let i=0;i<bars;i++){
      const ang=(i/bars)*Math.PI*2-Math.PI/2;
      const shimmer=reduce?0.7:(0.6+0.4*Math.sin(t*3.2+i*0.9));
      let a = active ? (swaraAct[i]/mx) : 0.3*shimmer;      // real note activation when live/locked
      if(active && a>0.05) a*=(0.86+0.14*shimmer);
      const len=8+(innerR*0.72)*Math.max(0.06,a);
      const x0=cx+Math.cos(ang)*innerR, y0=cy+Math.sin(ang)*innerR, x1=cx+Math.cos(ang)*(innerR+len), y1=cy+Math.sin(ang)*(innerR+len);
      const lit=!active||a>0.18; let c0,c1;
      if(locked){c0=lit?'#3f7a5c':'#241f18';c1=lit?'#74c69d':'#332b1d';}
      else{c0=lit?'#b45309':'#2a241c';c1=lit?'#fbbf24':'#39301f';}
      const bg=ctx.createLinearGradient(x0,y0,x1,y1); bg.addColorStop(0,c0); bg.addColorStop(1,c1);
      ctx.globalAlpha= active ? (0.3+0.7*Math.min(1,a*1.4)) : 0.7;
      ctx.strokeStyle=bg; ctx.lineWidth=6; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    }
    ctx.globalAlpha=1;
    if(mode==='idle'){ ctx.save(); ctx.translate(cx,cy); ctx.strokeStyle='rgba(242,236,226,0.8)'; ctx.fillStyle='rgba(242,236,226,0.8)';
      ctx.lineWidth=3; ctx.lineCap='round'; ctx.beginPath(); ctx.roundRect(-7,-18,14,24,7); ctx.fill();
      ctx.beginPath(); ctx.arc(0,-2,13,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,11); ctx.lineTo(0,18); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-8,18); ctx.lineTo(8,18); ctx.stroke(); ctx.restore(); }
    else if(locked){ ctx.save(); ctx.translate(cx,cy); ctx.strokeStyle='#74c69d'; ctx.lineWidth=4; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(-11,1); ctx.lineTo(-3,10); ctx.lineTo(13,-9); ctx.stroke(); ctx.restore(); }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  function slug(s){ return (s||'').replace(/ṁ/g,'m').normalize('NFKD').replace(/[̀-ͯ]/g,'')
      .toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

  id('file').onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(f) startFile(f); e.target.value=''; };
  orb.addEventListener('click',()=>{ if(mode==='idle'||mode==='locked') startLive(); });
  toIdle();
})();
</script>
</body>
</html>
