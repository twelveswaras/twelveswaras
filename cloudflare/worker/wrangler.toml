name = "twelveswaras-api"
main = "src/index.js"
compatibility_date = "2026-06-01"
workers_dev = true          # publish to *.workers.dev until the custom-domain route is enabled

# The headless recognizer (the HF Docker Space that serves /identify).
[vars]
SPACE_URL = "https://twelveswaras-recognizer-api.hf.space"
ALLOW_ORIGIN = "https://twelveswaras.com"

# Keep the recognizer warm. An idle HF Space sleeps, and waking it costs ~34s (measured) with no
# feedback on screen, so the first visitor after a quiet spell effectively meets a broken site.
# Five minutes is deliberately inside any plausible sleep timer; the worker logs `cold: true`
# whenever a ping had to wake it, so this can be widened once we know the real idle window.
[triggers]
crons = ["*/5 * * * *"]

# Same-origin route: twelveswaras.com/api/* -> this worker (Pages serves everything else).
[[routes]]
pattern = "twelveswaras.com/api/*"
zone_name = "twelveswaras.com"

# Usage logs (result metadata only, never audio).
[[d1_databases]]
binding = "DB"
database_name = "twelveswaras"
database_id = "c54d011a-1086-4618-a4e2-28d57cb1c0b6"

# Opt-in CC-BY contributed clips for the commons. Create with:
#   wrangler r2 bucket create twelveswaras-clips
[[r2_buckets]]
binding = "CLIPS"
bucket_name = "twelveswaras-clips"
