name = "twelveswaras-api"
main = "src/index.js"
compatibility_date = "2026-06-01"

# The headless recognizer. Point this at the HF Docker Space (or wherever the API is hosted).
[vars]
SPACE_URL = "https://twelveswaras-twelveswaras.hf.space"
ALLOW_ORIGIN = "https://twelveswaras.com"

# Route the worker under the apex domain so the browser calls same-origin: /api/*
# (set up after `wrangler deploy`; requires the zone to be on Cloudflare).
[[routes]]
pattern = "twelveswaras.com/api/*"
zone_name = "twelveswaras.com"

# Usage logs (result metadata only, never audio). Create with:
#   wrangler d1 create twelveswaras
# then paste the returned database_id below and run schema.sql (see DEPLOY.md).
[[d1_databases]]
binding = "DB"
database_name = "twelveswaras"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Opt-in CC-BY contributed clips for the commons. Create with:
#   wrangler r2 bucket create twelveswaras-clips
[[r2_buckets]]
binding = "CLIPS"
bucket_name = "twelveswaras-clips"
